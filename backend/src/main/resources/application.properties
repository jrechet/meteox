# --- Datasource : SQLite fichier (volume Docker en prod/int) ---
quarkus.datasource.db-kind=sqlite
quarkus.datasource.jdbc.url=jdbc:sqlite:meteox-laws.db
# En conteneur, le fichier vit sur le volume monté /data :
%prod.quarkus.datasource.jdbc.url=jdbc:sqlite:${MX_DB_PATH:/data/meteox-laws.db}
# Conteneur mono-writer (swarm replicas=1) : le job sync-scrutins (écriture, 05h45 UTC) et les
# lectures publiques de /api/laws ne doivent jamais se bloquer ni échouer en SQLITE_BUSY.
# WAL laisse lecteurs et écrivain cohabiter ; busy_timeout fait attendre un writer concurrent
# au lieu d'échouer immédiatement.
quarkus.datasource.jdbc.additional-jdbc-properties.journal_mode=WAL
quarkus.datasource.jdbc.additional-jdbc-properties.busy_timeout=5000

# --- Flyway : schéma + import initial des 4 lois vérifiées au premier démarrage ---
quarkus.flyway.migrate-at-start=true

# --- CORS : front GitHub Pages (lecture) + page admin servie par le backend (jrec.fr).
# La page admin est même origine que l'API mais un POST navigateur porte Origin: https://jrec.fr,
# que Quarkus refuse (403) si l'origine n'est pas listée — d'où l'ajout de jrec.fr + POST. ---
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=https://jrechet.github.io,https://jrec.fr
%dev.quarkus.http.cors.origins=https://jrechet.github.io,https://jrec.fr,http://localhost:5180,http://localhost:8099
quarkus.http.cors.methods=GET,POST,OPTIONS

# --- Job check-sources : tous les jours à 06h15 UTC ---
meteox.check-sources.cron=0 15 6 * * ?

# --- Job sync-scrutins (issue #3) : votes réalignés sur l'open data AN, 05h45 UTC ---
meteox.sync-scrutins.cron=0 45 5 * * ?
# Jeu « Scrutins » (un zip JSON par législature) — GET conditionnel via ETag.
meteox.opendata.scrutins.url-template=https://data.assemblee-nationale.fr/static/openData/repository/%d/loi/scrutins/Scrutins.json.zip
meteox.opendata.dir=target/opendata
%prod.meteox.opendata.dir=${MX_OPENDATA_DIR:/data/opendata}

# --- Job sync-dossiers (issue #3, tâche 2) : candidats « prochains scrutins », 05h15 UTC ---
meteox.sync-dossiers.cron=0 15 5 * * ?
meteox.sync-dossiers.legislature=17
meteox.opendata.dossiers.url-template=https://data.assemblee-nationale.fr/static/openData/repository/%d/loi/dossiers_legislatifs/Dossiers_Legislatifs.json.zip

# --- Signalement GitHub (issue REST API) — token injecté par l'environnement ---
meteox.github.repo=jrechet/meteox
meteox.github.api-base=https://api.github.com
meteox.github.token=${MX_GITHUB_TOKEN:}

# --- Module indicateurs IA (issue #4) : backend interchangeable par config seule ---
# claude-cli (abonnement local, défaut) | claude-api (API Anthropic) | ollama (LLM local dev)
quarkus.laws.ai.backend=claude-cli
meteox.ai.timeout-seconds=180
meteox.ai.claude-cli.command=claude -p
meteox.ai.claude-api.base-url=https://api.anthropic.com
# Clé API uniquement via secret d'environnement — jamais en dur dans le repo.
meteox.ai.claude-api.key=${MX_ANTHROPIC_API_KEY:}
meteox.ai.claude-api.model=claude-sonnet-5
meteox.ai.ollama.base-url=http://localhost:11434
meteox.ai.ollama.model=llama3.1

# --- Admin indicateurs (workflow draft -> published) : secret d'environnement obligatoire ---
meteox.admin.token=${MX_ADMIN_TOKEN:}

# --- Tests : base jetable, scheduler coupé, GitHub mocké (WireMock port 18089) ---
%test.quarkus.datasource.jdbc.url=jdbc:sqlite:target/meteox-laws-test.db
%test.quarkus.flyway.clean-at-start=true
%test.quarkus.scheduler.enabled=false
%test.meteox.github.api-base=http://localhost:18089
%test.meteox.github.token=test-token
# Tests indicateurs : backend CLI substitué par un stub local (aucun appel réseau), admin ouvert.
%test.meteox.admin.token=test-admin-token
%test.meteox.ai.claude-cli.command=/bin/cat src/test/resources/fixtures/indicators/outputs/claude-cli/eco-agri-1.json
# Tests sync-scrutins : open data servi par WireMock, cache jetable, re-check systématique.
%test.meteox.opendata.scrutins.url-template=http://localhost:18089/opendata/%d/Scrutins.json.zip
%test.meteox.opendata.dossiers.url-template=http://localhost:18089/opendata/%d/Dossiers.json.zip
%test.meteox.opendata.dir=target/test-opendata
%test.meteox.opendata.refresh-seconds=0
