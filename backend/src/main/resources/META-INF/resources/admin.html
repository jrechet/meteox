<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>meteox · admin dossiers</title>
    <style>
      :root {
        --bg: oklch(97.5% 0.012 85);
        --surface: oklch(99% 0.006 90);
        --line: oklch(87% 0.015 80);
        --line-strong: oklch(78% 0.02 78);
        --ink: oklch(24% 0.02 60);
        --ink-soft: oklch(44% 0.02 65);
        --ink-faint: oklch(60% 0.015 70);
        --accent: oklch(55% 0.13 250);
        --green: oklch(52% 0.15 145);
        --red: oklch(52% 0.2 28);
        --radius: 12px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: var(--ink);
        background: var(--bg);
      }
      header {
        padding: 1.2rem clamp(1rem, 4vw, 3rem);
        border-bottom: 1px solid var(--line);
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.75rem;
      }
      header h1 { font-size: 1.05rem; margin: 0; font-weight: 700; letter-spacing: -0.01em; }
      header .sub { color: var(--ink-faint); font-size: 0.82rem; }
      main { padding: clamp(1rem, 4vw, 3rem); max-width: 1100px; margin: 0 auto; }
      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 1rem 1.15rem;
        margin-bottom: 1rem;
      }
      label { display: block; font-size: 0.78rem; color: var(--ink-soft); margin-bottom: 0.25rem; font-weight: 600; }
      input, select, textarea, button {
        font: inherit;
        color: var(--ink);
      }
      input, select, textarea {
        width: 100%;
        padding: 0.5rem 0.6rem;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background: var(--bg);
      }
      textarea { min-height: 3.2rem; resize: vertical; }
      button {
        cursor: pointer;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 0.5rem 0.9rem;
        font-weight: 600;
        background: var(--ink);
        color: var(--bg);
        transition: filter 0.15s;
      }
      button:hover { filter: brightness(1.15); }
      button.ghost { background: transparent; color: var(--ink); border-color: var(--line-strong); }
      button.danger { background: transparent; color: var(--red); border-color: var(--red); }
      button.small { padding: 0.35rem 0.6rem; font-size: 0.85rem; }
      .row { display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: end; }
      .grow { flex: 1; min-width: 180px; }
      .toolbar { display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: end; margin-bottom: 1rem; }
      .count { color: var(--ink-faint); font-size: 0.85rem; align-self: center; }
      .cand { border-bottom: 1px solid var(--line); padding: 0.85rem 0; }
      .cand:last-child { border-bottom: 0; }
      .cand__head { display: flex; flex-wrap: wrap; gap: 0.5rem 0.8rem; align-items: baseline; }
      .cand__title { font-weight: 600; }
      .tag {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--accent);
        border: 1px solid color-mix(in oklch, var(--accent) 40%, var(--line));
        border-radius: 99px;
        padding: 0.05rem 0.5rem;
      }
      .cand__uid { color: var(--ink-faint); font-size: 0.78rem; font-family: ui-monospace, monospace; }
      .cand__sub { color: var(--ink-soft); font-size: 0.8rem; margin-top: 0.15rem; }
      .cand__author { font-size: 0.82rem; color: var(--ink-soft); margin-top: 0.35rem; }
      .cand__author strong { color: var(--ink); font-weight: 600; }
      .cand__cosign { margin-top: 0.4rem; display: flex; flex-wrap: wrap; gap: 0.3rem; align-items: center; }
      .cosign-count { font-size: 0.8rem; font-weight: 700; color: var(--ink); margin-right: 0.15rem; }
      .grp {
        font-size: 0.72rem;
        border-radius: 99px;
        padding: 0.04rem 0.45rem;
        border: 1px solid var(--line-strong);
        color: var(--ink-soft);
        white-space: nowrap;
      }
      .grp[data-bloc="gauche"] { color: oklch(50% 0.17 20); border-color: color-mix(in oklch, oklch(50% 0.17 20) 45%, var(--line)); }
      .grp[data-bloc="milieu"] { color: oklch(50% 0.12 95); border-color: color-mix(in oklch, oklch(50% 0.12 95) 45%, var(--line)); }
      .grp[data-bloc="droite"] { color: oklch(50% 0.13 250); border-color: color-mix(in oklch, oklch(50% 0.13 250) 45%, var(--line)); }
      .grp[data-bloc="extreme-droite"] { color: oklch(42% 0.11 270); border-color: color-mix(in oklch, oklch(42% 0.11 270) 45%, var(--line)); }
      .badge-gov {
        font-size: 0.72rem;
        font-weight: 700;
        color: oklch(45% 0.13 145);
        border: 1px solid color-mix(in oklch, oklch(45% 0.13 145) 45%, var(--line));
        border-radius: 99px;
        padding: 0.05rem 0.5rem;
      }
      .chk { display: flex; align-items: center; gap: 0.35rem; font-size: 0.82rem; color: var(--ink-soft); white-space: nowrap; }
      .chk input { width: auto; }
      .cand__actions { margin-top: 0.55rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
      .promote-form { margin-top: 0.7rem; padding: 0.8rem; border: 1px dashed var(--line-strong); border-radius: 8px; }
      .promote-form.hidden { display: none; }
      a { color: var(--accent); }
      .muted { color: var(--ink-faint); }
      #status { min-height: 1.4rem; font-size: 0.88rem; margin: 0.5rem 0; }
      .status--err { color: var(--red); }
      .status--ok { color: var(--green); }
      .empty { color: var(--ink-faint); padding: 1.5rem 0; text-align: center; }
      .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
    </style>
  </head>
  <body>
    <header>
      <h1>meteox · validation des dossiers</h1>
      <span class="sub">« Prochains scrutins » — promotion des candidats vérifiés</span>
    </header>
    <main>
      <div class="card" id="auth">
        <div class="row">
          <div class="grow">
            <label for="token">Jeton admin (X-Admin-Token)</label>
            <input id="token" type="password" autocomplete="off" placeholder="MX_ADMIN_TOKEN" />
          </div>
          <button id="load">Charger les candidats</button>
          <button id="sync" class="ghost" title="Relance la détection depuis l'open data (peut prendre ~1 min)">Synchroniser maintenant</button>
        </div>
        <p class="muted" style="margin:0.6rem 0 0;font-size:0.8rem;">
          Le jeton reste dans cet onglet (sessionStorage) et n'est jamais envoyé ailleurs qu'à l'API meteox.
        </p>
      </div>

      <p id="status" role="status" aria-live="polite"></p>

      <div class="toolbar" id="filters" hidden>
        <div>
          <label for="f-theme">Thème</label>
          <select id="f-theme"><option value="">Tous</option></select>
        </div>
        <div class="grow">
          <label for="f-search">Recherche (titre)</label>
          <input id="f-search" type="search" placeholder="ex. eau, pesticides, souveraineté…" />
        </div>
        <label class="chk"><input id="f-gov" type="checkbox" /> Projets de loi uniquement</label>
        <span class="count" id="count"></span>
      </div>

      <div class="card" id="list-card" hidden>
        <div id="list"></div>
      </div>
    </main>

    <template id="cand-tpl">
      <div class="cand">
        <div class="cand__head">
          <span class="badge-gov" data-gov hidden>★ Projet de loi · gouvernement</span>
          <span class="tag" data-theme></span>
          <span class="cand__title" data-title></span>
        </div>
        <div class="cand__sub"><span data-procedure></span> · <span class="cand__uid" data-uid></span></div>
        <div class="cand__author" data-author hidden>Déposé par <strong data-author-name></strong> <span class="grp" data-author-grp></span></div>
        <div class="cand__cosign" data-cosign hidden>
          <span class="cosign-count" data-cosign-total></span>
          <span class="cosign-groups" data-cosign-groups></span>
        </div>
        <div><a data-link target="_blank" rel="noopener">Dossier officiel ↗</a></div>
        <div class="cand__actions">
          <button class="small" data-act="open-promote">Promouvoir</button>
          <button class="small danger" data-act="reject">Rejeter</button>
        </div>
        <form class="promote-form hidden" data-form>
          <div class="row">
            <div>
              <label>Catégorie</label>
              <select data-f="category">
                <option value="agriculture">Agriculture &amp; Sols</option>
                <option value="eau">Gestion de l'Eau</option>
                <option value="pesticides">Pesticides</option>
                <option value="canicule">Canicule &amp; Chaleur</option>
              </select>
            </div>
            <div>
              <label>Date prévue</label>
              <input type="date" data-f="date" />
            </div>
            <div class="grow">
              <label>Fragment de titre attendu (vérification de source)</label>
              <input type="text" data-f="sourceExpect" />
            </div>
          </div>
          <div style="margin-top:0.6rem;">
            <label>Résumé (affiché sur la carte)</label>
            <textarea data-f="summary"></textarea>
          </div>
          <div style="margin-top:0.6rem;display:flex;gap:0.5rem;">
            <button type="submit" class="small">Publier la carte « à venir »</button>
            <button type="button" class="small ghost" data-act="cancel-promote">Annuler</button>
          </div>
        </form>
      </div>
    </template>

    <script>
      // API servie sur la même origine (backend), relative au dossier de cette page —
      // fonctionne aussi bien en local (:8080/admin.html) que derrière Traefik
      // (/meteox-laws-int/admin.html). Aucun CORS : même origine que l'API.
      const BASE = location.pathname.replace(/[^/]*$/, '');
      const $ = (sel, root = document) => root.querySelector(sel);
      const statusEl = $('#status');
      let candidates = [];

      const token = () => $('#token').value.trim();

      function setStatus(msg, kind) {
        statusEl.textContent = msg || '';
        statusEl.className = kind ? 'status--' + kind : '';
      }

      async function api(path, options = {}) {
        const res = await fetch(BASE + 'api/admin/dossiers' + path, {
          ...options,
          headers: { 'X-Admin-Token': token(), 'Content-Type': 'application/json', ...(options.headers || {}) },
        });
        if (res.status === 401) throw new Error('Jeton admin invalide.');
        if (res.status === 503) throw new Error('Admin fermé côté serveur (MX_ADMIN_TOKEN non configuré).');
        if (!res.ok) {
          let detail = 'HTTP ' + res.status;
          try { detail = (await res.json()).error || detail; } catch (_) {}
          throw new Error(detail);
        }
        return res.status === 204 ? null : res.json();
      }

      function themeOptions() {
        const themes = [...new Set(candidates.map((c) => c.theme))].sort();
        const sel = $('#f-theme');
        sel.innerHTML = '<option value="">Tous</option>' +
          themes.map((t) => `<option value="${t}">${t}</option>`).join('');
      }

      function render() {
        const theme = $('#f-theme').value;
        const q = $('#f-search').value.trim().toLowerCase();
        const govOnly = $('#f-gov').checked;
        const shown = candidates.filter(
          (c) =>
            (!theme || c.theme === theme) &&
            (!q || c.titre.toLowerCase().includes(q)) &&
            (!govOnly || c.projetDeLoi),
        );
        const list = $('#list');
        list.textContent = '';
        if (!candidates.length) {
          list.innerHTML = '<p class="empty">Aucun candidat en attente. Lance « Synchroniser maintenant » pour rafraîchir depuis l\'open data.</p>';
        } else if (!shown.length) {
          list.innerHTML = '<p class="empty">Aucun candidat pour ce filtre.</p>';
        } else {
          const tpl = $('#cand-tpl');
          shown.forEach((c) => list.appendChild(candNode(tpl, c)));
        }
        $('#count').textContent = shown.length + ' / ' + candidates.length + ' candidat(s)';
        $('#filters').hidden = false;
        $('#list-card').hidden = false;
      }

      function candNode(tpl, c) {
        const node = tpl.content.cloneNode(true);
        $('[data-theme]', node).textContent = c.theme;
        $('[data-title]', node).textContent = c.titre;
        $('[data-uid]', node).textContent = c.uid;
        $('[data-procedure]', node).textContent = c.procedure || '—';
        if (c.projetDeLoi) $('[data-gov]', node).hidden = false;
        // Initiateur : qui a déposé le texte + son groupe politique (teinté par bloc).
        if (c.auteur) {
          $('[data-author]', node).hidden = false;
          $('[data-author-name]', node).textContent = c.auteur.nom;
          const grp = $('[data-author-grp]', node);
          grp.textContent = c.auteur.sigle || '—';
          if (c.auteur.bloc) grp.dataset.bloc = c.auteur.bloc;
        }
        // Cosignataires par groupe : signal d'importance (nombre) + soutien transpartisan (chips).
        if (c.cosignatairesTotal > 0) {
          $('[data-cosign]', node).hidden = false;
          $('[data-cosign-total]', node).textContent = c.cosignatairesTotal + ' cosignataires';
          const groups = $('[data-cosign-groups]', node);
          (c.cosignatairesParGroupe || []).forEach((g) => {
            const chip = document.createElement('span');
            chip.className = 'grp';
            chip.textContent = (g.sigle || '?') + ' ' + g.count;
            if (g.bloc) chip.dataset.bloc = g.bloc;
            groups.appendChild(chip);
          });
        }
        $('[data-link]', node).href = c.dossierUrl;
        const form = $('[data-form]', node);
        // Défaut raisonnable pour le fragment vérifié : un extrait distinctif du titre.
        $('[data-f="sourceExpect"]', form).value = c.titre.split(/\s+/).slice(0, 6).join(' ');
        $('[data-f="summary"]', form).value = c.titre + '.';
        $('[data-act="open-promote"]', node).addEventListener('click', () => form.classList.toggle('hidden'));
        $('[data-act="cancel-promote"]', node).addEventListener('click', () => form.classList.add('hidden'));
        $('[data-act="reject"]', node).addEventListener('click', () => reject(c.uid));
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          promote(c.uid, {
            category: $('[data-f="category"]', form).value,
            date: $('[data-f="date"]', form).value,
            summary: $('[data-f="summary"]', form).value.trim(),
            sourceExpect: $('[data-f="sourceExpect"]', form).value.trim(),
          });
        });
        return node;
      }

      async function load() {
        if (!token()) return setStatus('Saisis le jeton admin.', 'err');
        sessionStorage.setItem('mx_admin_token', token());
        setStatus('Chargement…');
        try {
          candidates = await api('/candidates');
          themeOptions();
          render();
          setStatus(candidates.length + ' candidat(s) chargé(s).', 'ok');
        } catch (e) {
          setStatus(e.message, 'err');
        }
      }

      async function sync() {
        if (!token()) return setStatus('Saisis le jeton admin.', 'err');
        try {
          const r = await api('/sync', { method: 'POST' });
          if (r && r.status === 'running') {
            setStatus('Une synchronisation est déjà en cours. Recharge les candidats dans ~1 min.', 'ok');
          } else {
            setStatus('Synchronisation lancée en arrière-plan (~1-2 min). Clique « Charger les candidats » ensuite pour voir le résultat.', 'ok');
          }
        } catch (e) {
          setStatus(e.message, 'err');
        }
      }

      async function promote(uid, body) {
        if (!body.category || !body.date) return setStatus('Catégorie et date sont requises.', 'err');
        setStatus('Publication…');
        try {
          const r = await api('/' + encodeURIComponent(uid) + '/promote', {
            method: 'POST',
            body: JSON.stringify(body),
          });
          candidates = candidates.filter((c) => c.uid !== uid);
          render();
          setStatus('Carte publiée : ' + r.lawId + ' (vérifiée par check-sources au prochain contrôle).', 'ok');
        } catch (e) {
          setStatus(e.message, 'err');
        }
      }

      async function reject(uid) {
        if (!confirm('Rejeter ce candidat ? Il ne sera plus proposé.')) return;
        try {
          await api('/' + encodeURIComponent(uid) + '/reject', { method: 'POST' });
          candidates = candidates.filter((c) => c.uid !== uid);
          render();
          setStatus('Candidat rejeté.', 'ok');
        } catch (e) {
          setStatus(e.message, 'err');
        }
      }

      $('#load').addEventListener('click', load);
      $('#sync').addEventListener('click', sync);
      $('#f-theme').addEventListener('change', render);
      $('#f-search').addEventListener('input', render);
      $('#f-gov').addEventListener('change', render);
      const saved = sessionStorage.getItem('mx_admin_token');
      if (saved) { $('#token').value = saved; load(); }
    </script>
  </body>
</html>
