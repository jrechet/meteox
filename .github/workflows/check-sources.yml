name: Check law sources (daily)

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-sources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - id: check
        run: npm run check:sources 2>&1 | tee check-sources.log
        continue-on-error: true
      - if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('check-sources.log', 'utf8').slice(-6000);
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'sources-invalides',
            });
            const body = `Le contrôle quotidien des sources officielles a échoué.\n\nGolden Rule (AGENTS.md) : aucune carte ne doit être publiée avec une source invalide.\n\n\`\`\`\n${log}\n\`\`\``;
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: '🔗 Sources de lois invalides détectées (check quotidien)',
                labels: ['sources-invalides'], body,
              });
            }
      - if: steps.check.outcome == 'failure'
        run: exit 1
