name: backend-ci

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
      # LawsApiTest / IndicatorExtractorContractTest diffent l'API contre ce snapshot :
      # une modif du snapshot (côté front) doit re-déclencher les tests backend.
      - "src/data/laws-snapshot.json"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
      - "src/data/laws-snapshot.json"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build & tests (inclut le diff GET /api/laws vs src/lib/laws.js)
        working-directory: backend
        run: ./mvnw -B verify
