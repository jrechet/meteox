name: Backend CD (int)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-cd.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/jrechet/meteox-laws

concurrency:
  group: backend-cd
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - id: meta
        run: echo "tag=int-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - run: ./mvnw -B -DskipTests package
        working-directory: backend
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker build -t "$IMAGE:${{ steps.meta.outputs.tag }}" backend
          docker push "$IMAGE:${{ steps.meta.outputs.tag }}"

  deploy-int:
    needs: build-push
    runs-on: [self-hosted, meteox]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy stack mxlawsint
        working-directory: backend
        env:
          MX_IMAGE: ghcr.io/jrechet/meteox-laws
          MX_TAG: ${{ needs.build-push.outputs.tag }}
          MX_ENV: int
          MX_STACK: mxlawsint
          MX_DOMAIN: jrec.fr
          MX_PATH_PREFIX: /meteox-laws-int
          MX_CORS_ORIGINS: https://jrechet.github.io,https://jrec.fr
          MX_GITHUB_TOKEN: ${{ secrets.MX_GITHUB_TOKEN }}
          # Jeton admin de secours / automatisation (la voie principale humaine est GitHub OAuth).
          MX_ADMIN_TOKEN: ${{ secrets.MX_ADMIN_TOKEN }}
          # Connexion GitHub OAuth de l'admin — ACTIVE (mire de login GitHub).
          MX_OIDC_ENABLED: "true"
          # Client ID public (apparaît dans les URL de redirection) → pas un secret.
          MX_GITHUB_OAUTH_CLIENT_ID: Ov23li46I27ud7RciSMj
          MX_GITHUB_OAUTH_CLIENT_SECRET: ${{ secrets.MX_GITHUB_OAUTH_CLIENT_SECRET }}
          MX_ADMIN_GITHUB_LOGINS: jrechet
        run: docker stack up --detach=true -c docker-compose.yml mxlawsint

  verify-int:
    needs: deploy-int
    runs-on: [self-hosted, meteox]
    steps:
      - name: Convergence + acceptance externe (health + CORS via Traefik)
        run: |
          set -u
          SERVICE=mxlawsint_api
          BASE="https://jrec.fr/meteox-laws-int"

          # Diagnostics sur échec : code de sortie de la tâche + logs de démarrage.
          dump() {
            echo "::group::docker service ps --no-trunc $SERVICE"
            docker service ps --no-trunc "$SERVICE" || true
            echo "::endgroup::"
            echo "::group::docker service logs --tail 300 $SERVICE"
            docker service logs --tail 300 --timestamps "$SERVICE" 2>&1 || true
            echo "::endgroup::"
          }

          # 1) Attendre la convergence 1/1.
          for i in $(seq 1 40); do
            state=$(docker service ls --filter "name=$SERVICE" --format '{{.Replicas}}')
            echo "[$i] $SERVICE replicas: $state"
            [ "$state" = "1/1" ] && break
            sleep 5
          done
          if [ "$(docker service ls --filter "name=$SERVICE" --format '{{.Replicas}}')" != "1/1" ]; then
            echo "::error::le service $SERVICE n'a pas convergé en 1/1"
            dump
            exit 1
          fi

          # 2) Acceptance = la VRAIE voie utilisateur (Traefik + TLS, comme le front). Robuste à
          #    l'ordonnancement multi-nœuds du swarm — contrairement à une sonde docker locale
          #    qui suppose que la tâche tourne sur le nœud du runner. Retries généreux : pull
          #    d'image, 1re émission du certificat Let's Encrypt, bascule rolling-update.
          # Health ET CORS validés dans LA MÊME boucle de retry : pendant la bascule stop-first
          # (démarrage ~30 s avec OIDC), health peut répondre 200 une fraction de seconde avant
          # que /api/laws ne soit routé — un contrôle CORS non réessayé échouait à tort. On ne
          # sort en échec qu'après avoir épuisé les tentatives, jamais sur un transitoire.
          for i in $(seq 1 40); do
            if curl -fsS -m 10 "$BASE/api/health" >/dev/null 2>&1; then
              acao=$(curl -fsS -m 10 -o /dev/null -D - \
                       -H "Origin: https://jrechet.github.io" "$BASE/api/laws" 2>/dev/null \
                       | grep -i "access-control-allow-origin" || true)
              if echo "$acao" | grep -qi "jrechet.github.io"; then
                echo "accès externe + CORS OK (tentative $i) ; CORS: $acao"
                exit 0
              fi
              echo "[$i] health OK mais CORS pas encore prêt (${acao:-<absent>})…"
            else
              echo "[$i] pas encore joignable (pull image / cert LE / bascule)…"
            fi
            sleep 10
          done
          echo "::error::API/CORS non validés via $BASE après retries"
          dump
          exit 1
