name: Backend CD (int)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-cd.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/jrechet/meteox-laws

concurrency:
  group: backend-cd
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - id: meta
        run: echo "tag=int-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - run: ./mvnw -B -DskipTests package
        working-directory: backend
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker build -t "$IMAGE:${{ steps.meta.outputs.tag }}" backend
          docker push "$IMAGE:${{ steps.meta.outputs.tag }}"

  deploy-int:
    needs: build-push
    runs-on: [self-hosted, meteox]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy stack mxlawsint
        working-directory: backend
        env:
          MX_IMAGE: ghcr.io/jrechet/meteox-laws
          MX_TAG: ${{ needs.build-push.outputs.tag }}
          MX_ENV: int
          MX_STACK: mxlawsint
          MX_DOMAIN: meteox-laws.int.jrec.fr
          MX_CORS_ORIGINS: https://jrechet.github.io
          MX_GITHUB_TOKEN: ${{ secrets.MX_GITHUB_TOKEN }}
        run: docker stack up --detach=true -c docker-compose.yml mxlawsint

  verify-int:
    needs: deploy-int
    runs-on: [self-hosted, meteox]
    steps:
      - name: Wait for service and check health
        run: |
          for i in $(seq 1 30); do
            state=$(docker service ls --filter name=mxlawsint_api --format '{{.Replicas}}')
            echo "mxlawsint_api replicas: $state"
            [ "$state" = "1/1" ] && break
            sleep 5
          done
          [ "$(docker service ls --filter name=mxlawsint_api --format '{{.Replicas}}')" = "1/1" ]
      - name: Health via Traefik (sans dépendre du DNS public)
        run: |
          curl -fsk --resolve meteox-laws.int.jrec.fr:443:127.0.0.1 https://meteox-laws.int.jrec.fr/api/health
          echo
          curl -fsk --resolve meteox-laws.int.jrec.fr:443:127.0.0.1 -H "Origin: https://jrechet.github.io" -D - -o /dev/null https://meteox-laws.int.jrec.fr/api/laws | grep -i "access-control-allow-origin"
