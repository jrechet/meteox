name: Backend CD (int)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-cd.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/jrechet/meteox-laws

concurrency:
  group: backend-cd
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - id: meta
        run: echo "tag=int-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - run: ./mvnw -B -DskipTests package
        working-directory: backend
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker build -t "$IMAGE:${{ steps.meta.outputs.tag }}" backend
          docker push "$IMAGE:${{ steps.meta.outputs.tag }}"

  deploy-int:
    needs: build-push
    runs-on: [self-hosted, meteox]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy stack mxlawsint
        working-directory: backend
        env:
          MX_IMAGE: ghcr.io/jrechet/meteox-laws
          MX_TAG: ${{ needs.build-push.outputs.tag }}
          MX_ENV: int
          MX_STACK: mxlawsint
          MX_DOMAIN: jrec.fr
          MX_PATH_PREFIX: /meteox-laws-int
          MX_CORS_ORIGINS: https://jrechet.github.io
          MX_GITHUB_TOKEN: ${{ secrets.MX_GITHUB_TOKEN }}
          # Secret optionnel : sans lui l'admin reste fermé (503). À créer côté GitHub pour
          # activer la validation humaine des candidats dossiers / indicateurs.
          MX_ADMIN_TOKEN: ${{ secrets.MX_ADMIN_TOKEN }}
        run: docker stack up --detach=true -c docker-compose.yml mxlawsint

  verify-int:
    needs: deploy-int
    runs-on: [self-hosted, meteox]
    steps:
      - name: Health + CORS sur l'app (avec diagnostics si le conteneur crashe)
        run: |
          set -u
          SERVICE=mxlawsint_api

          # En cas d'échec, on veut enfin voir POURQUOI le conteneur s'arrête :
          # `service ps` expose le code de sortie de la tâche (ex. OOM 137),
          # `service logs` la stacktrace de démarrage.
          dump_diagnostics() {
            echo "::group::docker service ps --no-trunc $SERVICE"
            docker service ps --no-trunc "$SERVICE" || true
            echo "::endgroup::"
            echo "::group::docker service logs --tail 300 $SERVICE"
            docker service logs --tail 300 --timestamps "$SERVICE" 2>&1 || true
            echo "::endgroup::"
          }

          # 1) Attendre la convergence 1/1.
          for i in $(seq 1 40); do
            state=$(docker service ls --filter "name=$SERVICE" --format '{{.Replicas}}')
            echo "[$i] $SERVICE replicas: $state"
            [ "$state" = "1/1" ] && break
            sleep 5
          done
          if [ "$(docker service ls --filter "name=$SERVICE" --format '{{.Replicas}}')" != "1/1" ]; then
            echo "::error::le service $SERVICE n'a pas convergé en 1/1"
            dump_diagnostics
            exit 1
          fi

          # 2) Sonder health + CORS en partageant le netns d'un conteneur RUNNING
          #    (pas de dépendance DNS/TLS/Traefik). Retries : le conteneur peut
          #    mettre quelques secondes à écouter, ou flapper s'il crashe.
          probe() { docker run --rm --network "container:$1" curlimages/curl:latest "${@:2}"; }
          ok=""
          for i in $(seq 1 24); do
            cid=$(docker ps -q \
                    --filter "label=com.docker.swarm.service.name=$SERVICE" \
                    --filter "status=running" | head -1)
            if [ -n "$cid" ] && probe "$cid" -fsS -m 5 http://localhost:8080/api/health >/dev/null 2>&1; then
              echo "health OK (tentative $i)"
              acao=$(probe "$cid" -fsS -m 5 -o /dev/null -D - \
                       -H "Origin: https://jrechet.github.io" \
                       http://localhost:8080/api/laws 2>/dev/null \
                       | grep -i "access-control-allow-origin" || true)
              echo "CORS access-control-allow-origin: ${acao:-<absent>}"
              if ! echo "$acao" | grep -qi "jrechet.github.io"; then
                echo "::error::en-tête CORS attendu (jrechet.github.io) absent sur /api/laws"
                dump_diagnostics
                exit 1
              fi
              ok=1
              break
            fi
            echo "[$i] pas encore prêt (cid='${cid:-}')…"
            sleep 5
          done
          if [ -z "$ok" ]; then
            echo "::error::health/CORS KO après retries — le conteneur ne reste pas up"
            dump_diagnostics
            exit 1
          fi
      - name: Accès externe via Traefik (https://jrec.fr/meteox-laws-int) — acceptance issue #2
        run: |
          set -u
          BASE="https://jrec.fr/meteox-laws-int"
          # Retries généreux : la 1re émission du certificat Let's Encrypt pour
          # l'apex jrec.fr peut prendre ~1 min après la création du routeur.
          for i in $(seq 1 18); do
            if curl -fsS -m 10 "$BASE/api/health"; then
              echo; echo "accès externe OK (tentative $i)"
              acao=$(curl -fsS -m 10 -o /dev/null -D - \
                       -H "Origin: https://jrechet.github.io" "$BASE/api/laws" \
                       | grep -i "access-control-allow-origin" || true)
              echo "CORS externe: ${acao:-<absent>}"
              echo "$acao" | grep -qi "jrechet.github.io" || { echo "::error::CORS externe KO"; exit 1; }
              exit 0
            fi
            echo "[$i] pas encore joignable (cert LE en cours ?)…"
            sleep 10
          done
          echo "::error::API injoignable via $BASE après retries"
          exit 1
