name: Backend logs (int, à la demande)

on:
  workflow_dispatch:

jobs:
  dump-logs:
    runs-on: [self-hosted, meteox]
    timeout-minutes: 4
    steps:
      - name: Sonde (chaque commande bornée — jamais de blocage)
        run: |
          echo "::group::tâches du service"
          timeout 15 docker service ps --no-trunc mxlawsint_api || echo "(service ps indisponible)"
          echo "::endgroup::"
          CID=$(timeout 10 docker ps -q --filter "label=com.docker.swarm.service.name=mxlawsint_api" --filter status=running | head -1)
          echo "conteneur courant: ${CID:-aucun sur ce nœud}"
          if [ -n "$CID" ]; then
            echo "::group::logs applicatifs (300 dernières lignes)"
            timeout 30 docker logs --tail 300 "$CID" 2>&1 || echo "(logs indisponibles)"
            echo "::endgroup::"
            echo "::group::disque vu du conteneur"
            timeout 10 docker exec "$CID" df -h /data 2>&1 || echo "(df indisponible)"
            timeout 10 docker exec "$CID" ls -la /data /data/opendata 2>&1 | head -30 || true
            timeout 10 docker exec "$CID" du -sh /data/opendata 2>&1 || true
            echo "::endgroup::"
          fi
          echo "::group::disque hôte"
          timeout 10 df -h / /var/lib/docker 2>/dev/null || timeout 10 df -h || true
          echo "::endgroup::"
